<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CivicSewa – AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
    --primary:#2A4B79;
    --accent:#3d6fc9;
    --bg:#f4f8ff;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
}

.app{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #e6eefc;
    padding:25px 20px;
    display:flex;
    flex-direction:column;
    box-shadow:4px 0 20px rgba(0,0,0,0.04);
}

.brand{
    font-weight:700;
    font-size:20px;
    color:var(--primary);
    margin-bottom:40px;
}

.item{
    padding:12px 15px;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:.2s;
    color:var(--primary);
    font-weight:500;
}

.item:hover{
    background:#eaf1ff;
    transform:translateX(4px);
}

.item.active{
    background:linear-gradient(90deg,var(--primary),var(--accent));
    color:white;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:30px;
}

.topbar h2{
    color:var(--primary);
    margin-bottom:20px;
}

/* CHAT */
.chat{
    flex:1;
    background:white;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.06);
    display:flex;
    flex-direction:column;
    padding:20px;
}

.chatbox{
    flex:1;
    overflow-y:auto;
}

.message{
    max-width:70%;
    padding:12px 16px;
    margin-bottom:15px;
    border-radius:18px;
    animation:fadeIn .3s ease;
}

.bot{
    background:#eef4ff;
    align-self:flex-start;
}

.user{
    background:linear-gradient(90deg,var(--primary),var(--accent));
    color:white;
    align-self:flex-end;
}

.typing{
    font-style:italic;
    opacity:.7;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* INPUT */
.input-area{
    display:flex;
    margin-top:10px;
    gap:8px;
}

.input-area input{
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #dbeafe;
    outline:none;
}

.icon-btn{
    background:linear-gradient(90deg,var(--primary),var(--accent));
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:50%;
    cursor:pointer;
}

.icon-btn:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="app">

<div class="d-flex">
    <div id="sidebar" class="d-flex flex-column p-3" style="position: fixed; height: 100vh; overflow-y: auto;">
        <h3 class="p-3 fw-bold">CivicSewa</h3>
        <hr>
        <ul class="nav nav-pills flex-column flex-grow-1" style="color:#2A4B79">
<li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
            <li><a href="my-complaints.html" class="nav-link"><i class="bi bi-chat-dots me-2"></i> My Complaints</a></li>
            <li><a href="documents.html" class="nav-link"><i class="bi bi-file-earmark-pdf me-2"></i> Documents</a></li>
            <li><a href="broadcast.html" class="nav-link"><i class="bi bi-broadcast me-2"></i> Broadcast Channel</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-signpost-2 me-2"></i> Road </a></li>
            <li><a href="chatbot.html" class="nav-link active"><i class="bi bi bi-robot me-2"></i> Guidance Chatbot </a></li>
            <li><a href="settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
        
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
    </div>

    <div class="flex-grow-1 d-flex flex-column" style="background-color:#2A4B79;color: white; min-height: 100vh; margin-left: 260px;">
        <nav class="navbar navbar-expand shadow-sm p-3">
            <div class="container-fluid">
                <input type="text" class="form-control w-25" placeholder="Search...">
                <div class="ms-auto d-flex align-items-center">
                    <span class="badge bg-primary me-3" id="uWard">Ward --</span>
                    <strong id="uNameTop">User Name</strong>
                </div>
            </div>
        </nav>
</div> 

<div class="chat">

<div class="chatbox" id="chatbox"></div>

<div class="input-area">
    <input id="userInput" placeholder="Ask anything...">
    <button class="icon-btn" id="sendBtn">
        <i class="bi bi-send"></i>
    </button>
</div>

</div>
</div>
</div>

<script type="module">

import { model } from './chatbot.js';

const chatbox = document.getElementById("chatbox");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

/* Load chat history */
window.onload = ()=>{
    const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
    history.forEach(msg => addMessage(msg.text,msg.type,false));
    if(history.length === 0)
        addMessage("How can I help you?","bot",false);
};

/* Save chat */
function saveChat(){
    const messages = [];
    document.querySelectorAll(".message").forEach(m=>{
        if(!m.classList.contains("typing")){
            messages.push({
                text:m.innerText,
                type:m.classList.contains("user")?"user":"bot"
            });
        }
    });
    localStorage.setItem("chatHistory",JSON.stringify(messages));
}

/* Add message */
function addMessage(text,type,save=true){
    const msg = document.createElement("div");
    msg.className = "message "+type;
    msg.innerText = text;
    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
    if(save) saveChat();
}

/* Typing animation */
function showTyping(){
    const typing = document.createElement("div");
    typing.className="message bot typing";
    typing.id="typing";
    typing.innerText="Assistant is typing...";
    chatbox.appendChild(typing);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function removeTyping(){
    const t=document.getElementById("typing");
    if(t) t.remove();
}

/* Send */
async function sendMessage(){
    const text=userInput.value.trim();
    if(!text) return;

    addMessage(text,"user");
    userInput.value="";
    showTyping();

    const reply = await getAIResponse(text);

    removeTyping();
    addMessage(reply,"bot");
}

/* AI RESPONSE using Firebase Vertex AI */
async function getAIResponse(text){
    try {
        const result = await model.generateContent(
            `You are CivicSewa AI assistant helping citizens of Nepal. Answer this: ${text}`
        );
        const response = await result.response;
        return response.text();
    } catch (error) {
        console.error("Error generating content:", error);
        return "I encountered an issue. Please check your internet connection.";
    }
}

function handleEnter(e){
    if(e.key==="Enter") sendMessage();
}

// Event Listeners (This replaces the onclick in HTML)
sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keypress", handleEnter);

</script>
<script type="module" src="chatbot.js"></script>
</body>
</html>
