<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CivicSewa | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="../../css/base.css">
<style>
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.bg-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(135deg, rgba(255,215,0,.04) 0px, rgba(255,215,0,.04) 1px, transparent 1px, transparent 20px);
    animation: drift 40s linear infinite;
}
@keyframes drift { from{background-position:0 0} to{background-position:1000px 1000px} }

.login-card {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(30px);
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
    animation: fadeIn .8s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.card-title { font-weight: 900; color: #fff; text-align: center; margin-bottom: 6px; cursor: pointer; font-size: 1.8rem; }
.card-title span { color: var(--gold); }
.card-sub { text-align: center; color: var(--text-muted); font-size: .875rem; margin-bottom: 28px; }

.role-box {
    background: rgba(255,255,255,.04);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text-muted); border: 1px solid rgba(255,255,255,.08);
}
.role-box select { background: transparent; border: none; color: var(--gold); font-weight: 700; outline: none; }

.field-label { color: var(--text-muted); font-size: .8rem; font-weight: 600; margin-bottom: 6px; display: block; }
.auth-input {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    color: white; border-radius: 12px; padding: 13px 14px; font-family: inherit;
    font-size: .95rem; outline: none; transition: .3s;
}
.auth-input::placeholder { color: rgba(255,255,255,.3); }
.auth-input:focus { background: rgba(255,215,0,.07); border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,.1); }

.btn-gold {
    width: 100%; padding: 13px; border: none; border-radius: 12px; cursor: pointer;
    font-size: 1rem; font-weight: 700; font-family: inherit;
    background: linear-gradient(135deg, rgba(255,215,0,.9), rgba(200,160,0,.7));
    color: #000; transition: .3s; box-shadow: 0 4px 20px rgba(255,215,0,.2);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,215,0,.4); }

a { color: var(--gold); text-decoration: none; opacity: .8; }
a:hover { opacity: 1; text-decoration: underline; }
</style>
</head>

<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="bg-lines"></div>

<div class="login-card">
    <h2 class="card-title" onclick="location.href='../index.html'">Civic<span>Sewa</span></h2>
    <p class="card-sub">Sign in to your civic dashboard</p>

    <div class="role-box">
        <span>Sign in as</span>
        <select id="role">
            <option value="citizen">Citizen</option>
            <option value="admin">Ward Admin</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="field-label">Email Address</label>
        <input type="email" id="loginEmail" class="auth-input" placeholder="name@example.com" required>
    </div>
    <div class="mb-4">
        <label class="field-label">Password</label>
        <input type="password" id="loginPassword" class="auth-input" placeholder="Your password" required>
    </div>

    <div class="d-flex justify-content-between mb-3 small">
        <a href="forgot.html">Forgot password?</a>
        <a href="signup.html">Create account</a>
    </div>

    <button type="button" id="loginBtn" class="btn-gold" h>Login</button>
</div>

<div class="modal fade" id="verificationModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 text-center" style="background:rgba(20,14,40,.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:white;">
            <div style="font-size:2.5rem;margin-bottom:12px;">📬</div>
            <h5 class="fw-bold text-white">Email Verification Required</h5>
            <p class="small mt-2" style="color:var(--text-muted);">
                A verification email has been sent to:<br>
                <strong id="verifyEmail" style="color:var(--gold);"></strong>
            </p>
            <button id="resendBtn" class="btn-gold mt-3" style="border-radius:10px;padding:10px;">Resend Email</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../../js/core/auth-check.js"></script>
</body>
</html>
