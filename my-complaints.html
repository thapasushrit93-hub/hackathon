<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - My Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/citizen.css">
    <style>
        .complaint-card {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .complaint-card.high-priority::after {
            content: '';
            position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            background-color: #dc3545; /* Red edge for high priority */
            box-shadow: -2px 0 10px rgba(220, 53, 69, 0.5);
        }
        .photo-thumbnail {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s;
        }
        .photo-thumbnail:hover { filter: brightness(1.2); border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap">
                <i class="bi bi-buildings"></i>
                <span class="nav-text">CivicSewa</span>
            </div>
            <i class="bi bi-list fs-3 text-secondary" id="sidebarToggle" style="cursor: pointer; transition: 0.2s;"></i>
        </div>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="nav-text">Dashboard</span></a>
        <a href="my-complaints.html" class="nav-link active"><i class="bi bi-file-earmark-text"></i> <span class="nav-text">My Complaints</span></a>
        <a href="documents.html" class="nav-link"><i class="bi bi-file-earmark-pdf"></i> <span class="nav-text">Documents</span></a>
        <a href="broadcast.html" class="nav-link"><i class="bi bi-megaphone"></i> <span class="nav-text">Broadcast</span></a>
        <a href="road.html" class="nav-link"><i class="bi bi-geo-alt"></i> <span class="nav-text">Map</span></a>
        <a href="chatbot.html" class="nav-link"><i class="bi bi-robot"></i> <span class="nav-text">Chatbot</span></a>
        <a href="settings.html" class="nav-link"><i class="bi bi-gear"></i> <span class="nav-text">Settings</span></a>
        <button id="logoutBtn" class="sign-out-btn w-100 border-0 mt-auto" data-bs-toggle="modal" data-bs-target="#signOutModal">
            <i class="bi bi-box-arrow-right"></i> <span class="nav-text">Sign Out</span>
        </button>
    </nav>

    <main class="main-wrapper">

        <header class="top-nav">
            <div class="search-container">
                <i class="bi bi-search text-secondary"></i>
                <input type="text" placeholder="Search..." data-i18n="searchPlaceholder">
            </div>
            <div class="profile-section">
                <label class="theme-slider" title="Toggle Light/Dark Mode">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider-pill"></span>
                </label>
                <select id="languageSelect" class="form-select border-secondary text-light" style="background: rgba(0,0,0,0.4); width: auto;">
                    <option value="en" style="background: #110d20;">English</option>
                    <option value="np" style="background: #110d20;">नेपाली</option>
                </select>
                <div class="user-info ps-3 border-start border-secondary d-flex align-items-center">
                    <img src="https://ui-avatars.com/api/?name=Citizen&background=random" id="userAvatar" alt="User Avatar" class="rounded-circle me-2" width="42" height="42">
                    <div style="line-height: 1.3;">
                        <div class="fw-bold" style="font-size: 0.95rem;"><span id="uNameTop">Loading...</span></div>
                        <div id="uWard" style="font-size: 0.85rem; color: var(--text-muted);">Ward : --</div>
                    </div>
                </div>
            </div>
        </header>
        
        <h1 class="greeting-title" data-i18n="myComplaintsHeading">My Complaints</h1>

        <div class="content-layout" style="grid-template-columns: 1.2fr 1fr;">

            <!-- Submit Form -->
            <div class="glass-box" style="padding: 2rem;">
                <h5 class="mb-4 fw-bold"><i class="bi bi-plus-circle me-2 text-primary"></i> <span data-i18n="submitNew">Submit a New Complaint</span></h5>
                <form id="complaintForm">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="glass-label" data-i18n="formCategory">Category *</label>
                            <select id="compCategory" class="glass-input" required>
                                <option value="" disabled selected data-i18n="selectCategory">Select Category</option>
                                <option value="Road">Road Damage</option>
                                <option value="Water">Water Supply</option>
                                <option value="Electricity">Electricity</option>
                                <option value="Waste">Sanitation / Waste</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="glass-label" data-i18n="formLocation">Location *</label>
                            <div class="d-flex gap-2">
                                <input type="text" id="compLocation" class="glass-input" placeholder="e.g., Pulchowk, Ward 4" required style="flex:1;">
                                <button type="button" id="getLocationBtn" class="btn btn-sm btn-outline-warning" title="Use GPS">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </button>
                            </div>
                            <small id="locationCoords" class="text-muted mt-1 d-block" style="font-size:0.75rem;"></small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="glass-label" data-i18n="formTitle">Title *</label>
                        <input type="text" id="compTitle" class="glass-input" placeholder="Brief summary of the issue" required>
                    </div>

                    <div class="mb-3">
                        <label class="glass-label" data-i18n="formDesc">Description *</label>
                        <textarea id="compDesc" class="glass-input" rows="4" placeholder="Provide detailed information..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="glass-label">Photos <span class="text-muted small">(optional)</span></label>
                        <input type="file" id="compPhoto" class="glass-input" accept="image/*" multiple>
                    </div>

                    <button type="submit" class="btn-glass-primary" id="submitBtn">
                        <span id="submitBtnText" data-i18n="submitComplaintBtn">Submit Complaint</span>
                    </button>
                </form>
            </div>
            
            <!-- Complaints History -->
            <div class="glass-box" style="padding: 2rem; display: flex; flex-direction: column; max-height: 108vh;">
                <h5 class="mb-4 fw-bold"><i class="bi bi-clock-history me-2 text-info"></i> <span data-i18n="trackingHistory">Your Complaint History</span></h5>
                <div id="complaintsListContainer" class="row g-4" style="overflow-y: auto; padding-right: 10px; flex-grow: 1;">
                    <div class="col-12 text-center text-muted mt-5">
                        <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
                        <div data-i18n="loading">Loading records...</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Sign Out Modal -->
    <div class="modal fade glass-modal" id="signOutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-box-arrow-right text-danger fs-1 mb-3 d-block"></i>
                    <h5 class="mb-2 fw-bold">Sign Out</h5>
                    <p class="text-muted small mb-4">Are you sure you want to sign out of CivicSewa?</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-outline-light btn-sm w-50" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger btn-sm w-50" id="confirmSignOutBtn">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/citizen/my-complaints.js"></script>
    <script type="module">
        import { auth } from "../../js/core/firebase-config.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        document.getElementById('confirmSignOutBtn').addEventListener('click', function() {
            this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing Out...';
            this.disabled = true;
            signOut(auth).then(() => { window.location.href = "../../index.html"; })
            .catch(() => { alert("Failed to sign out."); this.innerHTML = 'Sign Out'; this.disabled = false; });
        });
    </script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebar').addEventListener('click', (e) => {
            const isToggle = e.target.closest('#sidebarToggle');
            const isLogo = e.target.closest('.logo-wrap');
            if (isToggle) { document.body.classList.add('sidebar-collapsed'); }
            else if (isLogo && document.body.classList.contains('sidebar-collapsed')) { document.body.classList.remove('sidebar-collapsed'); }
        });
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('civicsewa_theme') === 'light') {
            document.body.classList.add('light-theme');
            if (themeToggle) themeToggle.checked = true;
        }
        if (themeToggle) {
            themeToggle.addEventListener('change', function() {
                if (this.checked) { document.body.classList.add('light-theme'); localStorage.setItem('civicsewa_theme', 'light'); }
                else { document.body.classList.remove('light-theme'); localStorage.setItem('civicsewa_theme', 'dark'); }
            });
        }
    </script>
</body>
</html>
