<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Live Issue Map</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #sidebar { width: 260px; background: #2A4B79; color: white; position: fixed; height: 100vh; z-index: 1000; }
        .main-content { margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
        #map { height: calc(100vh - 70px); width: 100%; z-index: 1; }

        /* UI Overlays */

        .legend-panel {
            position: absolute; top: 90px; right: 20px; background: white; padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); z-index: 1000; 
            width: 280px; max-height: calc(100vh - 120px); overflow-y: auto;
        }

        .legend-item { display: flex; align-items: center; margin-bottom: 12px; }
        
        .legend-icon-sm {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; margin-right: 12px; color: white; font-size: 14px;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Marker Color Classes */
        .marker-road { background-color: #dc3545; }
        .marker-water { background-color: #0d6efd; }
        .marker-electricity { background-color: #ffc107; }
        .marker-sanitation { background-color: #198754; }
        .marker-broadcast { background-color: #135029; }
        .marker-strike { background-color: #AE8625; }
        .marker-other { background-color: #6c757d; }

        /* User Location Pulse */
        .user-marker { width: 25px; height: 25px; background: #9b59b6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(155, 89, 182, 0); } 100% { transform: scale(0.9); } }

        .locate-btn { position: absolute; bottom: 30px; right: 30px; z-index: 1000; background: white; width: 55px; height: 55px; border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; font-size: 24px; color: #2A4B79; }
    </style>
</head>

<body>
    <div class="d-flex">
        <div id="sidebar" class="d-flex flex-column p-3">
            <h3 class="p-3 fw-bold">CivicSewa</h3>
            <hr>
            <ul class="nav nav-pills flex-column flex-grow-1">
                <li><a href="dashboard.html" class="nav-link text-white"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
                <li><a href="road.html" class="nav-link active text-white"><i class="bi bi-signpost-2 me-2"></i> Road Map</a></li>
                <li><a href="my-complaints.html" class="nav-link text-white"><i class="bi bi-chat-dots me-2"></i> My Complaints</a></li>
            </ul>
            <hr>
            <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
        </div>

        <div class="main-content flex-grow-1">
            <nav class="navbar shadow-sm p-3 bg-white" style="height: 70px;">
                <div class="container-fluid"><h5 class="mb-0">Live Infrastructure & Complaint Map</h5></div>
            </nav>

            <div style="position: relative; flex-grow: 1;">

                <div id="map"></div>

                <div class="legend-panel">
                    <h5 class="mb-3"><i class="bi bi-funnel-fill me-2"></i>Filters</h5>
                    
                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="broadcast" id="fBroad" checked>
                        <span class="legend-icon-sm marker-broadcast"><i class="bi bi-broadcast"></i></span>
                        <label for="fBroad">Official Broadcasts</label>
                    </div>

                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="strike" id="fStrike" checked>
                        <span class="legend-icon-sm marker-strike"><i class="bi bi-exclamation-octagon"></i></span>
                        <label for="fStrike">Strikes / Blocks</label>
                    </div>

                    <hr>
                    <p class="small fw-bold text-muted mb-2">CITIZEN COMPLAINTS</p>

                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="road" id="fRoad" checked>
                        <span class="legend-icon-sm marker-road"><i class="bi bi-cone-striped"></i></span>
                        <label for="fRoad">Road Issues</label>
                    </div>

                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="water" id="fWater" checked>
                        <span class="legend-icon-sm marker-water"><i class="bi bi-droplet-fill"></i></span>
                        <label for="fWater">Water Supply</label>
                    </div>

                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="electricity" id="fElec" checked>
                        <span class="legend-icon-sm marker-electricity"><i class="bi bi-lightning-charge-fill"></i></span>
                        <label for="fElec">Electricity</label>
                    </div>

                    <div class="legend-item">
                        <input type="checkbox" class="form-check-input me-2" value="sanitation" id="fSani" checked>
                        <span class="legend-icon-sm marker-sanitation"><i class="bi bi-trash-fill"></i></span>
                        <label for="fSani">Sanitation</label>
                    </div>
                </div>

                <button class="locate-btn" id="locateBtn"><i class="bi bi-crosshair"></i></button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // 1. Initialize Map
        const map = L.map('map').setView([27.7172, 85.3240], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Map Layers
        const layers = {
            broadcast: L.layerGroup().addTo(map),
            strike: L.layerGroup().addTo(map),
            road: L.layerGroup().addTo(map),
            water: L.layerGroup().addTo(map),
            electricity: L.layerGroup().addTo(map),
            sanitation: L.layerGroup().addTo(map),
            other: L.layerGroup().addTo(map)
        };

        const config = {
            broadcast: { icon: 'bi-broadcast', bg: 'marker-broadcast' },
            strike: { icon: 'bi-exclamation-octagon', bg: 'marker-strike' },
            road: { icon: 'bi-cone-striped', bg: 'marker-road' },
            water: { icon: 'bi-droplet-fill', bg: 'marker-water' },
            electricity: { icon: 'bi-lightning-charge-fill', bg: 'marker-electricity' },
            sanitation: { icon: 'bi-trash-fill', bg: 'marker-sanitation' },
            other: { icon: 'bi-question-circle', bg: 'marker-other' }
        };

        // 3. Helper to create Markers
        function addMarkerToMap(data, type, source) {
            if (!data.lat || !data.lng) return;

            const conf = config[type] || config.other;
            const iconHTML = `<div class="legend-icon-sm ${conf.bg} shadow"><i class="bi ${conf.icon}"></i></div>`;
            
            const marker = L.marker([data.lat, data.lng], {
                icon: L.divIcon({ className: '', html: iconHTML, iconSize: [32, 32] })
            }).bindPopup(`
                <div style="min-width:180px">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="badge bg-light text-dark border">${source.toUpperCase()}</span>
                        ${data.status ? `<span class="badge bg-primary">${data.status}</span>` : ''}
                    </div>
                    <h6 class="fw-bold mb-1">${data.title}</h6>
                    <p class="small text-muted mb-2">${data.description || data.content || ''}</p>
                    <div class="small border-top pt-2">
                        <i class="bi bi-geo-alt me-1"></i> Ward ${data.wardNumber || data.ward || '--'}
                    </div>
                </div>
            `);

            marker.addTo(layers[type]);
        }

        // 4. Real-time Listeners
        
        // Listener A: Broadcasts
        onSnapshot(query(collection(db, "broadcasts")), (snap) => {
            layers.broadcast.clearLayers();
            layers.strike.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                const type = d.isStrike ? 'strike' : 'broadcast';
                addMarkerToMap(d, type, 'Official');
            });
        });

        // Listener B: Complaints
        onSnapshot(query(collection(db, "complaints")), (snap) => {
            // Clear infrastructure layers before redraw
            ['road', 'water', 'electricity', 'sanitation', 'other'].forEach(l => layers[l].clearLayers());
            
            snap.forEach(doc => {
                const d = doc.data();
                if (!d.lat || !d.lng) return;

                // Map database category to our layer keys
                let cat = (d.category || 'other').toLowerCase();
                if (cat.includes('road')) cat = 'road';
                else if (cat.includes('water')) cat = 'water';
                else if (cat.includes('elec')) cat = 'electricity';
                else if (cat.includes('sani')) cat = 'sanitation';
                else cat = 'other';

                addMarkerToMap(d, cat, 'Citizen');
            });
        });

        // 5. Filter Logic
        document.querySelectorAll('.form-check-input').forEach(box => {
            box.onchange = (e) => {
                const val = e.target.value;
                if(e.target.checked) map.addLayer(layers[val]);
                else map.removeLayer(layers[val]);
            };
        });

        // 6. User Location
        document.getElementById('locateBtn').onclick = () => map.locate({setView: true, maxZoom: 15});
        map.on('locationfound', (e) => {
            L.marker(e.latlng, {
                icon: L.divIcon({ className: '', html: '<div class="user-marker"></div>', iconSize: [25, 25] })
            }).addTo(map).bindPopup("You are here");
        });

        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            if(confirm("Sign out?")) window.location.href = "login.html";
        };
    </script>
</body>
</html>
