<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CivicSewa | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="../../css/base.css">
<style>
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
}
.bg-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(135deg, rgba(255,215,0,.04) 0px, rgba(255,215,0,.04) 1px, transparent 1px, transparent 20px);
    animation: drift 40s linear infinite;
}
@keyframes drift { from{background-position:0 0} to{background-position:1000px 1000px} }

.signup-card {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(30px);
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
    animation: fadeIn .8s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.card-title { font-weight: 900; color: #fff; text-align: center; margin-bottom: 6px; cursor: pointer; font-size: 1.8rem; }
.card-title span { color: var(--gold); }
.card-sub { text-align: center; color: var(--text-muted); font-size: .875rem; margin-bottom: 28px; }

.field-label { color: var(--text-muted); font-size: .8rem; font-weight: 600; margin-bottom: 6px; display: block; }
.auth-input, .auth-select {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    color: white; border-radius: 12px; padding: 12px 14px; font-family: inherit;
    font-size: .9rem; outline: none; transition: .3s;
}
.auth-input::placeholder { color: rgba(255,255,255,.3); }
.auth-input:focus, .auth-select:focus { background: rgba(255,215,0,.07); border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,.1); }
.auth-select option { background: #0f0b1f; color: white; }

.btn-gold {
    width: 100%; padding: 13px; border: none; border-radius: 12px; cursor: pointer;
    font-size: 1rem; font-weight: 700; font-family: inherit;
    background: linear-gradient(135deg, rgba(255,215,0,.9), rgba(200,160,0,.7));
    color: #000; transition: .3s; box-shadow: 0 4px 20px rgba(255,215,0,.2);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,215,0,.4); }

a { color: var(--gold); text-decoration: none; opacity: .8; }
a:hover { opacity: 1; text-decoration: underline; }
</style>
</head>

<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="bg-lines"></div>

<div class="signup-card">
    <h2 class="card-title" onclick="location.href='../../index.html'">Civic<span>Sewa</span></h2>
    <p class="card-sub">Join the national smart governance network</p>

    <form id="regForm">
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="field-label">Full Name</label>
                <input type="text" id="fullName" class="auth-input" placeholder="Aayush Sharma" required>
            </div>
            <div class="col-md-6">
                <label class="field-label">Account Type</label>
                <select id="userType" class="auth-select" required>
                    <option value="resident">Citizen / Resident</option>
                    <option value="ward">Ward Official</option>
                </select>
            </div>
        </div>

        <div class="row g-3 mb-3" id="wardFields" style="display:none;">
            <div class="col-md-6">
                <label class="field-label">Ward No.</label>
                <input type="number" id="ward" class="auth-input" placeholder="e.g. 10">
            </div>
            <div class="col-md-6">
                <label class="field-label">Municipality</label>
                <input type="text" id="muni" class="auth-input" placeholder="Lalitpur">
            </div>
        </div>

        <div class="mb-3">
            <label class="field-label">Email Address</label>
            <input type="email" id="regEmail" class="auth-input" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
            <label class="field-label">Phone Number</label>
            <input type="tel" id="phone" class="auth-input" placeholder="+977 98XXXXXXXX">
        </div>

        <div class="mb-4">
            <label class="field-label">Password</label>
            <input type="password" id="regPass" class="auth-input" placeholder="Create a strong password" required>
        </div>

        <button type="button" id="registerBtn" class="btn-gold">Create Account</button>

        <div class="text-center mt-3 small">
            <span style="color:var(--text-muted);">Already have an account?</span>
            <a href="login.html"> Sign in here</a>
        </div>
    </form>
</div>

<div class="modal fade" id="verificationModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4" style="background:rgba(20,14,40,.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:white;">
            <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
            <h5 class="fw-bold text-white">Account Created!</h5>
            <p class="small mt-2" style="color:var(--text-muted);">
                We've sent a verification link to:<br>
                <strong id="verifyEmail" style="color:var(--gold);"></strong>
            </p>
            <p class="small" style="color:var(--text-muted);">Please verify your email before signing in.</p>
            <button type="button" id="resendBtn" class="btn-gold mt-2" style="border-radius:10px;padding:10px;">Resend Verification Email</button>
            <button type="button" class="btn-gold mt-2" style="border-radius:10px;padding:10px;background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.15);" onclick="window.location.href='login.html'">Go to Login</button>
        </div>
    </div>
</div>

<script>
document.getElementById("userType").addEventListener("change", (e) => {
    const wardFields = document.getElementById("wardFields");
    if (e.target.value === "ward") {
        wardFields.style.display = "flex";
        document.getElementById("ward").required = true;
        document.getElementById("muni").required = true;
    } else {
        wardFields.style.display = "none";
        document.getElementById("ward").required = false;
        document.getElementById("muni").required = false;
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../../js/core/auth-check.js"></script>
</body>
</html>
