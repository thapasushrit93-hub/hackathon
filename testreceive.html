<!DOCTYPE html>
<html>
<style>
  .broadcast-card { 
    padding: 10px; margin: 5px; border-left: 5px solid #4A90E2; 
    background: #f4f4f4; animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>
<body>
  <h2>Live Feed</h2>
  <div id="feed">Waiting for broadcasts...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
    
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Create a query sorted by time
    const q = query(collection(db, "broadcasts"), orderBy("createdAt", "desc"));

    // Listen for real-time updates
    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = ''; // Clear and redraw (simplest way for beginners)

      snapshot.forEach((doc) => {
        const data = doc.data();
        const div = document.createElement('div');
        div.className = 'broadcast-card';
        div.innerText = data.message;
        feed.appendChild(div);
      });
    });
  </script>
</body>
</html>
