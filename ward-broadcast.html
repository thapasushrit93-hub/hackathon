<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Broadcast Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/citizen.css">
    <style>
        .leaflet-popup-content-wrapper { background:#1a1625; color:white; border:1px solid rgba(255,255,255,0.1); border-radius:12px; }
        .leaflet-popup-tip { background:#1a1625; }
        #mapSearchResults { max-height:180px; overflow-y:auto; background:rgba(15,11,31,0.97); border:1px solid rgba(255,255,255,0.1); border-radius:8px; }
    </style>
</head>
<body>
<div class="container-fluid">
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<nav id="sidebar">
    <div class="sidebar-header">
        <div class="logo-wrap"><i class="bi bi-buildings-fill"></i> <span class="nav-text">CivicSewa <span class="text-warning ms-1" style="font-size:0.7rem;">ADMIN</span></span></div>
        <i class="bi bi-list fs-3 text-secondary" id="sidebarToggle" style="cursor:pointer;"></i>
    </div>
    <a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="nav-text">Control Panel</span></a>
    <a href="ward-complaints.html" class="nav-link"><i class="bi bi-inboxes"></i> <span class="nav-text">Ward Complaints</span></a>
    <a href="ward-broadcast.html" class="nav-link active"><i class="bi bi-broadcast"></i> <span class="nav-text">Broadcast Log</span></a>
    <a href="ward-road.html" class="nav-link"><i class="bi bi-map"></i> <span class="nav-text">Live Map</span></a>
    <a href="ward-settings.html" class="nav-link"><i class="bi bi-gear"></i> <span class="nav-text">Settings</span></a>
    <button id="logoutBtn" class="sign-out-btn w-100 border-0 mt-auto" data-bs-toggle="modal" data-bs-target="#signOutModal">
        <i class="bi bi-box-arrow-right"></i> <span class="nav-text">Sign Out</span>
    </button>
</nav>

<main class="main-wrapper">
    <header class="top-nav">
        <div class="search-container">
            <i class="bi bi-search text-secondary"></i>
            <input type="text" placeholder="Search broadcasts...">
        </div>
        <div class="profile-section">
            <label class="theme-slider" title="Toggle Light/Dark Mode">
                <input type="checkbox" id="themeToggle"><span class="slider-pill"></span>
            </label>
            <div class="user-info ps-3 border-start border-secondary d-flex align-items-center gap-2">
                <div style="line-height:1.3;text-align:right;">
                    <div class="fw-bold" style="font-size:0.95rem;" id="uNameTop">Loading...</div>
                    <div id="uWard" style="font-size:0.85rem;color:var(--text-muted);">Ward : --</div>
                </div>
            </div>
        </div>
    </header>

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h1 class="greeting-title mb-1">Broadcast Log</h1>
            <p class="text-muted">Manage and post official ward broadcasts.</p>
        </div>
        <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-circle me-2"></i>New Broadcast
        </button>
    </div>

    <div class="row g-3" id="broadcastContainer">
        <div class="col-12 text-center mt-5 text-muted">
            <div class="spinner-border spinner-border-sm me-2"></div>Loading broadcasts...
        </div>
    </div>
</main>

<!-- Create Broadcast Modal -->
<div class="modal fade" id="createModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content" style="background:#0f0b1f;border:1px solid rgba(255,255,255,0.1);border-radius:16px;color:white;">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold"><i class="bi bi-broadcast me-2 text-warning"></i>New Broadcast</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="d-flex" style="min-height:520px;">

                    <!-- Left: Form -->
                    <div class="d-flex flex-column p-4 gap-3" style="width:360px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;">
                        <div>
                            <label class="form-label small text-muted fw-bold">Title *</label>
                            <input type="text" id="title" class="form-control" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:white;" placeholder="Broadcast title">
                        </div>
                        <div>
                            <label class="form-label small text-muted fw-bold">Content *</label>
                            <textarea id="content" class="form-control" rows="4" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:white;" placeholder="Broadcast message..."></textarea>
                        </div>
                        <div>
                            <label class="form-label small text-muted fw-bold">Location (pick on map) *</label>
                            <div class="d-flex gap-2 mb-1">
                                <input type="text" id="locationNameInput" class="form-control" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:white;flex:1;" placeholder="Address auto-fills on pin">
                                <button type="button" id="getLocationBtn" class="btn btn-outline-warning btn-sm text-nowrap">
                                    <i class="bi bi-crosshair me-1"></i>Get GPS
                                </button>
                            </div>
                            <small id="locationCoords" class="text-warning d-block" style="font-family:monospace;font-size:0.75rem;"></small>
                            <input type="hidden" id="latInput">
                            <input type="hidden" id="lngInput">
                        </div>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="emergency">
                                <label class="form-check-label text-danger fw-bold small" for="emergency">Emergency</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="isStrike">
                                <label class="form-check-label text-warning fw-bold small" for="isStrike">Strike/Roadblock</label>
                            </div>
                        </div>
                        <button type="button" id="postBtn" class="btn btn-warning w-100 fw-bold mt-auto">
                            <i class="bi bi-send me-2"></i>Post
                        </button>
                    </div>

                    <!-- Right: Map -->
                    <div class="d-flex flex-column flex-grow-1">
                        <!-- Search bar above map -->
                        <div class="p-3 border-bottom border-secondary" style="position:relative;">
                            <div class="d-flex gap-2">
                                <input type="text" id="mapSearchInput" class="form-control" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:white;" placeholder="Search location on map...">
                                <button type="button" id="mapSearchBtn" class="btn btn-warning btn-sm px-3">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                            <div id="mapSearchResults" class="mt-1"></div>
                        </div>
                        <!-- Map -->
                        <div style="flex:1;position:relative;">
                            <div id="modalMap" style="width:100%;height:100%;min-height:380px;"></div>
                            <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:rgba(255,255,255,0.7);padding:5px 14px;border-radius:20px;font-size:0.72rem;pointer-events:none;z-index:1000;">
                                <i class="bi bi-cursor me-1"></i>Click map to drop pin
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Sign Out Modal -->
<div class="modal fade glass-modal" id="signOutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                <i class="bi bi-box-arrow-right text-danger fs-1 mb-3 d-block"></i>
                <h5 class="mb-2 fw-bold">Sign Out</h5>
                <p class="text-muted small mb-4">Are you sure you want to sign out?</p>
                <div class="d-flex gap-2 justify-content-center">
                    <button type="button" class="btn btn-outline-light btn-sm w-50" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm w-50" id="confirmSignOutBtn">Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    document.getElementById('sidebarToggle').addEventListener('click', () => document.body.classList.toggle('sidebar-collapsed'));
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('civicsewa_theme') === 'light') { document.body.classList.add('light-theme'); if (themeToggle) themeToggle.checked = true; }
    if (themeToggle) {
        themeToggle.addEventListener('change', function() {
            if (this.checked) { document.body.classList.add('light-theme'); localStorage.setItem('civicsewa_theme', 'light'); }
            else { document.body.classList.remove('light-theme'); localStorage.setItem('civicsewa_theme', 'dark'); }
        });
    }
</script>

<script type="module" src="../../js/ward/ward-broadcast.js"></script>

<script type="module">
    import { auth } from "../../js/core/firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    document.getElementById('confirmSignOutBtn').addEventListener('click', function() {
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        signOut(auth).then(() => window.location.replace("../../index.html"));
    });
</script>
</body>
</html>
