<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Broadcast Channel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #8ea9bb; }
        #sidebar { width: 260px; background-color: #2A4B79; color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 1000; }
        #sidebar .nav-link { color: #dce6f3; border-radius: 10px; margin-bottom: 6px; padding: 10px 15px; }
        #sidebar .nav-link:hover, #sidebar .nav-link.active { background-color: #1d3557; color: white; }
        
        .main-content { margin-left: 260px; min-height: 100vh; }
        
        .broadcast-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); position: relative; transition: 0.3s ease; }
        .broadcast-card:hover { transform: translateY(-5px); }
        .broadcast-card.emergency { border-left: 6px solid #e0333d; }
        .delete-btn { position: absolute; top: 12px; right: 12px; }
        
        /* Map Picker Style */
        #modalMap { height: 200px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 10px; z-index: 1; }
    </style>
</head>

<body>
<div class="d-flex">
    <div id="sidebar" class="d-flex flex-column p-3">
        <h3 class="p-3 fw-bold">CivicSewa</h3>
        <hr>
        <ul class="nav nav-pills flex-column flex-grow-1">
            <li><a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
            <li><a href="ward-complaints.html" class="nav-link"><i class="bi bi-chat-dots me-2"></i> Ward Complaints</a></li>
            <li><a href="ward-broadcast.html" class="nav-link active"><i class="bi bi-broadcast me-2"></i> Broadcast Channel</a></li>
            <li><a href="ward-road-fixed.html" class="nav-link"><i class="bi bi-broadcast me-2"></i> Ward Road</a></li>
            <li><a href="ward-settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
    </div>

    <div class="main-content flex-grow-1">
        <nav class="navbar shadow-sm p-3" style="background:#2A4B79;color:white;">
            <div class="container-fluid">
                <span class="fw-bold">Ward Broadcast Channel</span>
                <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#createModal">
                    + Create Broadcast
                </button>
            </div>
        </nav>

        <div class="container-fluid p-4">
            <div class="row g-4" id="broadcastContainer"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create Broadcast & Mark Location</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <input id="title" class="form-control mb-3" placeholder="Title">
                        <textarea id="content" class="form-control mb-3" rows="3" placeholder="Description"></textarea>
                        
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="emergency">
                            <label class="form-check-label fw-bold">Emergency Update</label>
                        </div>
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isStrike">
                            <label class="form-check-label text-danger fw-bold">Is this a Strike/Roadblock?</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Click on the map to set location:</label>
                        <div id="modalMap"></div>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="text" id="latInput" class="form-control form-control-sm" placeholder="Lat" readonly>
                            </div>
                            <div class="col-6">
                                <input type="text" id="lngInput" class="form-control form-control-sm" placeholder="Lng" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-primary w-100" id="postBtn">Post Broadcast</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="ward-broadcast.js"></script>

</body>
</html>
