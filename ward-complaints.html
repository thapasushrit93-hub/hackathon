<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Ward Complaints</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../../css/base.css">

    <style>
        .admin-input {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        .admin-input:focus {
            background: rgba(0, 0, 0, 0.6) !important;
            border-color: var(--gold) !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25) !important;
        }
        .complaint-card {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .complaint-card.high-priority::after {
            content: '';
            position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            background-color: #dc3545; /* Red edge for high priority */
            box-shadow: -2px 0 10px rgba(220, 53, 69, 0.5);
        }
        .photo-thumbnail {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s;
        }
        .photo-thumbnail:hover { filter: brightness(1.2); border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap">
                <i class="bi bi-buildings-fill"></i> 
                <span class="nav-text">CivicSewa <span class="text-warning ms-1" style="font-size: 0.7rem;">ADMIN</span></span>
            </div>
            <i class="bi bi-list fs-3 text-secondary" id="sidebarToggle" style="cursor: pointer;"></i>
        </div>
        
        <a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> <span class="nav-text">Control Panel</span></a>
        <a href="ward-complaints.html" class="nav-link active"><i class="bi bi-inboxes"></i> <span class="nav-text">Ward Complaints</span></a>
        <a href="ward-broadcast.html" class="nav-link"><i class="bi bi-broadcast"></i> <span class="nav-text">Broadcast Log</span></a>
        <a href="ward-settings.html" class="nav-link"><i class="bi bi-gear"></i> <span class="nav-text">Settings</span></a>
        
        <button id="logoutBtn" class="sign-out-btn w-100 border-0 mt-auto">
            <i class="bi bi-box-arrow-right"></i> <span class="nav-text">Sign Out</span>
        </button>
    </nav>

    <main class="main-wrapper">
        
        <header class="top-nav">
            <div class="search-container">
                <i class="bi bi-search text-secondary"></i>
                <input type="text" id="searchInput" placeholder="Search by title, citizen, or location...">
            </div>
            
            <div class="profile-section">
                <label class="theme-slider" title="Toggle Light/Dark Mode">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider-pill"></span>
                </label>
                
                <select id="languageSelect" class="form-select border-secondary text-light" style="background: rgba(0,0,0,0.4); width: auto;">
                    <option value="en" style="background: #110d20;">English</option>
                    <option value="np" style="background: #110d20;">नेपाली</option>
                </select>

                <div class="user-info ps-3 border-start border-secondary">
                    <div style="line-height: 1.3;">
                        <div class="fw-bold text-end" style="font-size: 0.95rem;"><span id="uNameTop">Loading...</span></div>
                        <div class="text-warning text-end" style="font-size: 0.85rem;" id="uWard">Ward --</div>
                    </div>
                </div>
            </div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="greeting-title mb-0">Citizen Issue Tracker</h1>
            <div class="d-flex gap-2">
                <span class="badge bg-primary d-flex align-items-center"><i class="bi bi-envelope-open me-1"></i>Submitted</span>
                <span class="badge bg-warning text-dark d-flex align-items-center"><i class="bi bi-tools me-1"></i>In Progress</span>
                <span class="badge bg-success d-flex align-items-center"><i class="bi bi-check-circle me-1"></i>Resolved</span>
            </div>
        </div>

        <div class="row g-4" id="complaintsContainer">
            <div class="col-12 text-center mt-5">
                <div class="spinner-border text-secondary"></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            document.getElementById('sidebar').addEventListener('click', (e) => {
                const isToggle = e.target.closest('#sidebarToggle');
                const isLogo = e.target.closest('.logo-wrap');
                if (isToggle) { body.classList.add('sidebar-collapsed'); } 
                else if (isLogo && body.classList.contains('sidebar-collapsed')) { body.classList.remove('sidebar-collapsed'); }
            });
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('civicsewa_theme') === 'light') { body.classList.add('light-theme'); if (themeToggle) themeToggle.checked = true; }
            if (themeToggle) {
                themeToggle.addEventListener('change', function() {
                    if (this.checked) { body.classList.add('light-theme'); localStorage.setItem('civicsewa_theme', 'light'); } 
                    else { body.classList.remove('light-theme'); localStorage.setItem('civicsewa_theme', 'dark'); }
                });
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/ward/ward-complaints.js"></script>
</body>
</html>
