<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa - Ward Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #8ea9bb; font-family: 'Segoe UI', sans-serif; }
        #sidebar { width: 260px; background-color: #2A4B79; color: white; position: fixed; height: 100vh; overflow-y: auto; }
        #sidebar .nav-link { color: #dce6f3; border-radius: 10px; margin-bottom: 6px; padding: 10px 15px; }
        #sidebar .nav-link.active { background-color: #1d3557; color: white; }
        .main-content { margin-left: 260px; min-height: 100vh; }
        .navbar { background: #2A4B79 !important; color: white; }
        .complaint-card { background: white; border-radius: 15px; border: none; transition: 0.3s; }
        .complaint-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .search-container { max-width: 500px; width: 100%; }
        /* Complaint Card */
.complaint-card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
  transition: 0.2s ease;
}

.complaint-card:hover {
  transform: translateY(-3px);
}

/* Title */
.complaint-card h4 {
  margin-bottom: 10px;
  font-weight: 600;
}

/* Button */
.complaint-card button {
  margin-top: 12px;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background-color: #0d6efd;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}

.complaint-card button:hover {
  background-color: #084298;
}

/* Status Badge */
.status {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: white;
}

.status.Submitted {
  background-color: #0d6efd;
}

.status.InProgress {
  background-color: #ffc107;
  color: black;
}

.status.Resolved {
  background-color: #198754;
}

.status.Rejected {
  background-color: #dc3545;
}

    </style>
</head>
<body>

<div class="d-flex">
    <div id="sidebar" class="d-flex flex-column p-3">
        <h3 class="p-3 fw-bold">CivicSewa</h3>
        <hr>
        <ul class="nav nav-pills flex-column flex-grow-1">
            <li><a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
            <li><a href="ward-complaints.html" class="nav-link active"><i class="bi bi-chat-dots me-2"></i> Ward Complaints</a></li>
            <li><a href="ward-broadcast.html" class="nav-link"><i class="bi bi-broadcast me-2"></i> Broadcast Channel</a></li>
            <li><a href="ward-settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
    </div>

    <div class="flex-grow-1 main-content">
        <nav class="navbar navbar-expand shadow-sm p-3">
            <div class="container-fluid">
                <span class="fw-bold me-4">WARD OFFICE PORTAL</span>
                
                <div class="search-container">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control border-0" placeholder="Search title, description or location...">
                    </div>
                </div>
                
                <div class="ms-auto d-flex align-items-center">
                    <span class="badge bg-primary me-3" id="uWard">Ward --</span>
                    <strong id="uNameTop">User Name</strong>
                    <select id="languageSelect" class="form-select form-select-sm w-auto ms-3">
                        <option value="en">English</option>
                        <option value="np">नेपाली</option>
                    </select>
                </div>
        </nav>
        <div class="container-fluid p-4">
            <div id="complaintsContainer" class="row g-4">
                <!-- Complaint cards will be dynamically inserted here -->
        <div class="complaint-card">
          
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="ward-complaints.js"></script>
</body>
</html>
